<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض التصاميم السحابي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-between p-6">

    <!-- الموقع الحقيقي اللي بيظهر لأي زائر (مستحيل يختفي أو يفتح مكانه خانة) -->
    <div class="w-full max-w-2xl text-center py-10">
        <h1 id="site-title" class="text-3xl font-bold text-emerald-400 mb-4">معرض التصاميم السحابي</h1>
        <p id="site-desc" class="text-slate-300 text-lg mb-8">أهلاً بك في معرض أعمالي والتصاميم الاحترافية.</p>
        
        <!-- زرار صغير تحت خالص للأدمن بس عشان يفتح لوحة التحكم بمزاجه -->
        <button onclick="toggleAdmin()" class="text-xs text-slate-600 hover:text-slate-400 underline mt-20">إدارة الموقع (أدمن)</button>
    </div>

    <!-- لوحة التحكم السرية (مقفولة تماماً ومش بتظهر إلا لما تدوس على الزرار اللي فوق) -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl">
            <h2 class="text-lg font-bold text-amber-400 mb-3">لوحة التحكم السريعة ⚡</h2>
            <input type="text" id="quick-input" placeholder="اكتب التعديل هنا..." class="w-full p-3 rounded bg-slate-900 border border-slate-600 text-white mb-4 text-sm focus:outline-none focus:border-emerald-500">
            
            <div class="flex gap-2">
                <button onclick="saveChanges()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 font-bold py-2 rounded text-sm transition">حفظ</button>
                <button onclick="toggleAdmin()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded text-sm transition">إلغاء</button>
            </div>
            <p id="save-status" class="text-xs text-center text-yellow-400 mt-3"></p>
        </div>
    </div>

    <!-- الكود البرمجي الصافي -->
    <script>
        const siteDesc = document.getElementById("site-desc");
        const adminPanel = document.getElementById("admin-panel");
        const quickInput = document.getElementById("quick-input");
        const saveStatus = document.getElementById("save-status");

        // أول ما الصفحة تفتح، بيقرا من ذاكرة التليفون المحلية فوراً وبكل هدوء من غير أخطاء
        function loadData() {
            const savedText = localStorage.getItem("ziad_site_text");
            if (savedText) {
                siteDesc.innerText = savedText;
            }
        }

        // دالة فتح وغلق لوحة الأدمن (مستحيل تفتح لوحدها)
        window.toggleAdmin = function() {
            adminPanel.classList.toggle("hidden");
            if (!adminPanel.classList.contains("hidden")) {
                quickInput.value = siteDesc.innerText;
                quickInput.focus();
            }
        }

        // زرار الحفظ السريع
        window.saveChanges = function() {
            const val = quickInput.value.trim();
            if (!val) return;

            saveStatus.innerText = "جاري الحفظ...";

            // حفظ فوري ومحلي عشان يظهر في ثواني بدون تهنيج
            localStorage.setItem("ziad_site_text", val);
            siteDesc.innerText = val;

            // قفل النافذة فوراً
            adminPanel.classList.add("hidden");
            saveStatus.innerText = "";
        }

        loadData();
    </script>
</body>
</html>
