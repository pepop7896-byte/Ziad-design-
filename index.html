<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض التصاميم السحابي الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-between p-6">

    <div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-4 text-emerald-400">معرض التصاميم السحابي</h1>
        <p id="site-desc" class="text-slate-300 text-center mb-6">جاري تحميل المحتوى...</p>

        <!-- لوحة التحكم -->
        <div id="admin-panel" class="bg-slate-900 p-4 rounded-xl border border-slate-700 mb-4">
            <h2 class="text-sm font-semibold text-amber-400 mb-2">لوحة التحكم (Admin):</h2>
            <input type="text" id="new-text-input" placeholder="اكتب التعديل الجديد هنا..." class="w-full p-2 rounded bg-slate-800 border border-slate-600 text-white mb-2 text-sm focus:outline-none focus:border-emerald-500">
            <button id="save-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition">حفظ التعديل</button>
        </div>

        <div class="text-center">
            <span class="text-xs text-slate-500">الحالة: <span id="status-text" class="text-yellow-400">جاهز</span></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAdHXEti11YCm_qFz6pSxddoiMbEef6lnw",
          authDomain: "ziad-design.firebaseapp.com",
          projectId: "ziad-design",
          storageBucket: "ziad-design.firebasestorage.app",
          messagingSenderId: "940003578074",
          appId: "1:940003578074:web:ade63b7b664e3127de15e3",
          measurementId: "G-4H7FVPVCGE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusText = document.getElementById("status-text");
        const siteDesc = document.getElementById("site-desc");
        const saveBtn = document.getElementById("save-btn");
        const textInput = document.getElementById("new-text-input");

        // أول ما الموقع يفتح، بيقرأ من الذاكرة المحلية كبديل سريع عشان ما يعلقش
        async function loadData() {
            const savedLocal = localStorage.getItem("ziad_site_text");
            if (savedLocal) {
                siteDesc.innerText = savedLocal;
            }

            try {
                const docRef = doc(db, "settings", "mainContent");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    siteDesc.innerText = docSnap.data().description;
                    localStorage.setItem("ziad_site_text", docSnap.data().description);
                }
            } catch (error) {
                console.log("يعمل بالذاكرة المحلية مؤقتاً");
            }
        }

        // زر الحفظ بيكتب محلياً وفي السحابة فوراً من غير ما يهنج
        saveBtn.addEventListener("click", async () => {
            const val = textInput.value.trim();
            if (!val) {
                alert("اكتب حاجة الأول!");
                return;
            }

            statusText.innerText = "جاري الحفظ...";
            
            // حفظ محلي فوري عشان ما يعلقش معاك
            localStorage.setItem("ziad_site_text", val);
            siteDesc.innerText = val;
            textInput.value = "";
            statusText.innerText = "تم الحفظ بنجاح! ✅";

            // محاولة رفعها للسحابة في الخلفية
            try {
                await setDoc(doc(db, "settings", "mainContent"), {
                    description: val
                });
            } catch (error) {
                console.log("تم الحفظ محلياً بانتظار اتصال السحابة");
            }
        });

        loadData();
    </script>
</body>
</html>
